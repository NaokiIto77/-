<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>謎の石碑クイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fire: #e8801a;
    --ember: #c45a0a;
    --stone: #3a3328;
    --fog: rgba(180,200,220,0.12);
    --gold: #d4a843;
    --gold-dark: #a07828;
    --parchment: #f0e6c8;
    --dark-bg: #0c0d0f;
    --circle-size: clamp(80px, 11%, 130px);
  }

  html, body {
    height: 100%;
    background: var(--dark-bg);
    color: var(--parchment);
    font-family: 'Noto Serif JP', serif;
    overflow-x: hidden;
  }

  /* ===== MAIN PAGE ===== */
  #main-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(40,25,10,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 0%, rgba(10,12,18,0.8) 0%, transparent 80%),
      linear-gradient(180deg, #080a10 0%, #111418 40%, #0c0d0f 100%);
    padding: 2rem 1rem 4rem;
  }

  .title-area {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .title-area h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 30px rgba(212,168,67,0.5);
  }
  .title-area p {
    font-size: 0.85rem;
    color: rgba(240,230,200,0.5);
    letter-spacing: 0.2em;
    margin-top: 0.4rem;
  }

  /* stone image + button overlay */
  .stone-container {
    position: relative;
    width: min(92vw, 760px);
    user-select: none;
  }
  .stone-container img {
    width: 100%;
    display: block;
    border-radius: 8px;
    filter: brightness(0.92) contrast(1.05);
  }
.q-btn {
  position: absolute;
  width: var(--circle-size);
  height: var(--circle-size);
  border-radius: 50%;
  border: none;
  background: transparent;
  color: transparent;
  -webkit-appearance: none;
  appearance: none;
  box-shadow: none;
  font-family: 'Cinzel', serif;
  font-size: clamp(0.6rem, 1.4vw, 0.95rem);
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translate(-50%, -50%);
  transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  letter-spacing: 0.05em;
  backdrop-filter: blur(1px);
  z-index: 10;
}
  .q-btn:hover {
  background: radial-gradient(ellipse 80% 60% at 50% 10%, rgba(212,168,67,0.35) 0%, transparent 70%);
  border: none;
  box-shadow: none;
  transform: translate(-50%, -50%) scale(1.08);
}
  .q-btn:active {
    transform: translate(-50%, -50%) scale(0.96);
  }
  .q-btn .q-label {
    pointer-events: none;
    text-align: center;
    line-height: 1.2;
  }
  .q-btn .q-num {
    font-size: clamp(0.5rem, 1.1vw, 0.75rem);
    opacity: 0.75;
    display: block;
  }

  /* Extra buttons outside the stone for 問4 & 問6 */
  .extra-btns {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.2rem;
  }
  .extra-btn {
    width: var(--circle-size);
    height: var(--circle-size);
    border-radius: 50%;
    border: 2px solid rgba(212,168,67,0.4);
    background: rgba(212,168,67,0.07);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 1.4vw, 0.95rem);
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, transform 0.2s;
    letter-spacing: 0.05em;
  }
  .extra-btn:hover {
    background: rgba(212,168,67,0.18);
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(212,168,67,0.4);
    transform: scale(1.08);
  }
  .extra-btn .q-num {
    font-size: clamp(0.5rem, 1.1vw, 0.75rem);
    opacity: 0.75;
  }
  .extra-label {
    font-size: 0.72rem;
    color: rgba(240,230,200,0.4);
    text-align: center;
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
  }

  /* ===== QUESTION PAGE ===== */
  #question-page {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(180deg, #080a10 0%, #0e1016 100%);
    padding: 2rem 1rem 4rem;
  }
  #question-page.active {
    display: flex;
  }

  .q-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: min(100%, 700px);
    margin-bottom: 2rem;
  }
  .back-btn {
    background: none;
    border: 1.5px solid rgba(212,168,67,0.4);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover {
    background: rgba(212,168,67,0.12);
    border-color: var(--gold);
  }
  .q-title-bar {
    flex: 1;
    text-align: center;
  }
  .q-title-bar h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px rgba(212,168,67,0.4);
  }

  .q-card {
    width: min(100%, 700px);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 10px;
    padding: 2rem 2.5rem;
    backdrop-filter: blur(4px);
  }
  .q-text {
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--parchment);
    margin-bottom: 2rem;
    min-height: 60px;
  }
  .q-placeholder {
    color: rgba(240,230,200,0.35);
    font-style: italic;
    font-size: 0.9rem;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .choice-btn {
    background: rgba(212,168,67,0.05);
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 6px;
    padding: 0.85rem 1.2rem;
    color: var(--parchment);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.95rem;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    letter-spacing: 0.03em;
  }
  .choice-btn:hover {
    background: rgba(212,168,67,0.12);
    border-color: rgba(212,168,67,0.6);
    transform: translateX(4px);
  }
  .choice-btn.selected {
    background: rgba(212,168,67,0.22);
    border-color: var(--gold);
    color: var(--gold);
  }
  .choice-btn.correct {
    background: rgba(60,180,80,0.2);
    border-color: #5cb85c;
    color: #90ee90;
  }
  .choice-btn.wrong {
    background: rgba(180,50,50,0.2);
    border-color: #b05050;
    color: #ff9999;
  }

  .submit-btn {
    margin-top: 1.5rem;
    width: 100%;
    background: rgba(212,168,67,0.12);
    border: 1.5px solid var(--gold-dark);
    border-radius: 6px;
    padding: 0.9rem;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .submit-btn:hover {
    background: rgba(212,168,67,0.22);
    box-shadow: 0 0 16px rgba(212,168,67,0.3);
  }
  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .result-msg {
    margin-top: 1.2rem;
    padding: 1rem;
    border-radius: 6px;
    text-align: center;
    font-size: 1rem;
    display: none;
  }
  .result-msg.show { display: block; }
  .result-msg.correct-msg { background: rgba(60,180,80,0.15); border: 1px solid #5cb85c; color: #90ee90; }
  .result-msg.wrong-msg { background: rgba(180,50,50,0.15); border: 1px solid #b05050; color: #ff9999; }

  /* decorative divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    opacity: 0.3;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold);
  }
  .divider span { color: var(--gold); font-size: 0.8rem; }

  /* transition */
  #main-page {
    transition: opacity 0.3s;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #question-page.active {
    animation: fadeIn 0.35s ease both;
  }
</style>
</head>

      text: "問6：ここに問題文を入力してください。",
      choices: ["① 選択肢A", "② 選択肢B", "③ 選択肢C", "④ 選択肢D"],
      correct: 1
    },
    7: {
      text: "問7：ここに問題文を入力してください。",
      choices: ["① 選択肢A", "② 選択肢B", "③ 選択肢C", "④ 選択肢D"],
      correct: 2
    }
  };

  let selectedIdx = -1;
  let answered = false;

  function openQuestion(n) {
    const q = questions[n];
    document.getElementById('q-title').textContent = '問' + n;
    document.getElementById('q-text').textContent = q.text;

    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    q.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.onclick = () => selectChoice(btn, i);
      choicesEl.appendChild(btn);
    });

    selectedIdx = -1;
    answered = false;
    document.getElementById('submit-btn').disabled = true;
    const rm = document.getElementById('result-msg');
    rm.className = 'result-msg';
    rm.textContent = '';

    document.getElementById('main-page').style.display = 'none';
    const qp = document.getElementById('question-page');
    qp.classList.add('active');
    window.scrollTo(0, 0);
    qp._currentQ = n;
  }

  function goBack() {
    document.getElementById('question-page').classList.remove('active');
    document.getElementById('main-page').style.display = '';
    window.scrollTo(0, 0);
  }

  function selectChoice(btn, idx) {
    if (answered) return;
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedIdx = idx;
    document.getElementById('submit-btn').disabled = false;
  }

  function checkAnswer() {
    if (selectedIdx < 0 || answered) return;
    answered = true;
    const qp = document.getElementById('question-page');
    const n = qp._currentQ;
    const correct = questions[n].correct;
    const btns = document.querySelectorAll('.choice-btn');
    const rm = document.getElementById('result-msg');

    btns.forEach((b, i) => {
      b.classList.remove('selected');
      if (i === correct) b.classList.add('correct');
      else if (i === selectedIdx) b.classList.add('wrong');
    });

    if (selectedIdx === correct) {
      rm.className = 'result-msg correct-msg show';
      rm.textContent = '✓ 正解！封印が解かれた。';
    } else {
      rm.className = 'result-msg wrong-msg show';
      rm.textContent = '✗ 不正解…。石碑の謎は解けなかった。';
    }
    document.getElementById('submit-btn').disabled = true;
  }
</script>
</body>
